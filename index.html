<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Credit Card Processing System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card-preview">
        <h3>CREDIT CARD</h3>
        <div id="displayNumber">**** **** **** ****</div>
        <div class="card-bottom">
            <span id="displayName">CARD HOLDER</span>
            <span id="displayExpiry">MM/YY</span>
        </div>
    </div>

    <h2>Payment Form</h2>

    <input type="text" id="name" placeholder="Card Holder Name">

    <input type="text" id="cardNumber"
           placeholder="Card Number"
           maxlength="16">

    <input type="text" id="expiry"
           placeholder="MM/YY">

    <input type="password" id="cvv"
           placeholder="CVV"
           maxlength="3">

    <input type="number" id="amount"
           placeholder="Amount">

    <button onclick="payNow()">Pay Now</button>

    <p id="message"></p>

    <h3>Transaction History</h3>
    <ul id="history"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
